# OneCRM — host Nginx vhost (reference copy of the production config)
#
# Install on the server:
#   sudo cp deploy/nginx/onecrm.neothons.com.conf /etc/nginx/sites-available/onecrm
#   sudo ln -sf /etc/nginx/sites-available/onecrm /etc/nginx/sites-enabled/onecrm
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d onecrm.neothons.com --redirect   # adds the 443 block + HTTP→HTTPS redirect
#
# Reverse-proxies onecrm.neothons.com → the web container on 127.0.0.1:3000,
# which serves the React SPA and proxies /api to the Bun server internally.
# (The SSL 443 server block + HTTP→HTTPS redirect are added/managed by Certbot.)

server {
    listen 80;
    server_name onecrm.neothons.com;

    # Allow logo/file uploads to pass through to the app
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    include snippets/custom_errors.conf;
}
